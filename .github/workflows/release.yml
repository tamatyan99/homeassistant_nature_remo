name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  test:
    name: Pre-release tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@6849a6489940f00c2f30c0fb92c6274307ccb58a # v4.1.2
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt', '**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint with ruff
        run: |
          python -m ruff check custom_components/nature_remo/ tests/

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short --timeout=120

  release:
    name: Build and publish release
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Verify manifest version matches tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          MANIFEST_VERSION=$(jq -r '.version' custom_components/nature_remo/manifest.json)
          if [ "$MANIFEST_VERSION" != "$VERSION" ]; then
            echo "Error: manifest.json version ($MANIFEST_VERSION) does not match tag ($VERSION)"
            exit 1
          fi

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION=${GITHUB_REF_NAME}
          awk '/^## \['"${VERSION#v}"'\]/{flag=1;next}/^## \[/{flag=0}flag' CHANGELOG.md > release_notes.md || true
          if [ ! -s release_notes.md ]; then
            echo "No changelog section found for ${VERSION}; using auto-generated notes." > release_notes.md
          fi

      - name: Create integration zip
        run: |
          cd custom_components
          zip -r ../nature_remo.zip nature_remo/

      - name: Upload zip to release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          files: nature_remo.zip
          body_path: release_notes.md
          generate_release_notes: true
