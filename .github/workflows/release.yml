name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Pre-release tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt', '**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint with ruff
        run: |
          python -m ruff check custom_components/nature_remo/ tests/

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

  release:
    name: Build and publish release
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify manifest version matches tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          MANIFEST_VERSION=$(jq -r '.version' custom_components/nature_remo/manifest.json)
          if [ "$MANIFEST_VERSION" != "$VERSION" ]; then
            echo "Error: manifest.json version ($MANIFEST_VERSION) does not match tag ($VERSION)"
            exit 1
          fi

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION=${GITHUB_REF_NAME}
          # Extract section for this version from CHANGELOG.md
          awk '/^## \['"${VERSION#v}"'\]/{flag=1;next}/^## \[/{flag=0}flag' CHANGELOG.md > release_notes.md || true
          if [ ! -s release_notes.md ]; then
            echo "No changelog section found for ${VERSION}; using auto-generated notes." > release_notes.md
          fi

      - name: Create integration zip
        run: |
          cd custom_components
          zip -r ../nature_remo.zip nature_remo/

      - name: Upload zip to release
        uses: softprops/action-gh-release@c95fe14e6cc4bbf5ba124de81b1d7b0a16fca586 # v2.2.1
        with:
          files: nature_remo.zip
          body_path: release_notes.md
          generate_release_notes: true
